<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>投资标的推荐报告 - 阿尔法公社</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', sans-serif;
    background: linear-gradient(135deg, #1a365d 0%, #2b6cb0 100%);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .card {
    background: white; border-radius: 16px; box-shadow: 0 25px 50px rgba(0,0,0,0.25);
    max-width: 800px; width: 100%; overflow: hidden;
  }
  .header {
    background: linear-gradient(135deg, #1a365d, #2b6cb0);
    padding: 40px; color: white; text-align: center;
  }
  .header h1 { font-size: 28px; margin-bottom: 8px; font-weight: 700; }
  .header p { font-size: 14px; opacity: 0.85; line-height: 1.6; }
  .content { padding: 40px; }
  .info-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
  .info-item { text-align: center; padding: 20px; border-radius: 12px; background: #f7fafc; }
  .info-item .label { font-size: 12px; color: #718096; margin-bottom: 6px; }
  .info-item .value { font-size: 18px; font-weight: 700; color: #1a365d; }
  .info-item .sub { font-size: 11px; color: #a0aec0; margin-top: 4px; }
  .tags { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-bottom: 30px; }
  .tag { padding: 6px 16px; border-radius: 20px; font-size: 13px; font-weight: 500; }
  .tag.blue { background: #ebf8ff; color: #2b6cb0; }
  .tag.red { background: #fff5f5; color: #e53e3e; }
  .tag.green { background: #f0fff4; color: #2f855a; }
  .tag.purple { background: #faf5ff; color: #6b46c1; }
  .btn {
    display: inline-block; background: linear-gradient(135deg, #1a365d, #2b6cb0);
    color: white; padding: 16px 48px; border-radius: 12px; text-decoration: none;
    font-size: 16px; font-weight: 600; transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 15px rgba(26,54,93,0.3);
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(26,54,93,0.4); }
  .footer { text-align: center; padding: 20px; color: #a0aec0; font-size: 12px; border-top: 1px solid #e2e8f0; }
  .portfolio { display: flex; gap: 16px; margin-bottom: 30px; }
  .port-item { flex: 1; padding: 16px; border-radius: 10px; border: 1px solid #e2e8f0; text-align: center; }
  .port-item .name { font-weight: 700; font-size: 15px; margin-bottom: 4px; }
  .port-item .role { font-size: 12px; color: #718096; }
  .port-item.zpf .name { color: #2b6cb0; }
  .port-item.lh .name { color: #2f855a; }
  .port-item.sy .name { color: #e53e3e; }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <h1>投资标的推荐报告</h1>
    <p>B轮（及B+轮）AI / 具身智能 / 硬科技领域科技创业公司推荐<br>面向机构：阿尔法公社 · 投资阶段偏好适配性分析</p>
  </div>
  <div class="content">
    <div class="info-grid">
      <div class="info-item">
        <div class="label">报告日期</div>
        <div class="value">2026年5月</div>
      </div>
      <div class="info-item">
        <div class="label">推荐标的</div>
        <div class="value">3家</div>
        <div class="sub">B轮 / B+轮</div>
      </div>
      <div class="info-item">
        <div class="label">赛道方向</div>
        <div class="value">具身智能</div>
      </div>
    </div>
    <div class="tags">
      <span class="tag blue">AI + 硬科技</span>
      <span class="tag red">人形机器人</span>
      <span class="tag green">工业自动化</span>
      <span class="tag purple">消费级商业化</span>
    </div>
    <div class="portfolio">
      <div class="port-item zpf">
        <div class="name">智平方</div>
        <div class="role">大脑层 · GOVLA模型</div>
      </div>
      <div class="port-item lh">
        <div class="name">灵猴机器人</div>
        <div class="role">执行层 · 核心零部件</div>
      </div>
      <div class="port-item sy">
        <div class="name">松延动力</div>
        <div class="role">场景层 · 消费端</div>
      </div>
    </div>
    <div style="text-align: center;">
      <a href="https://github.com/lilexi-bot/investment-report/raw/gh-pages/%E6%8A%95%E8%B5%84%E6%A0%87%E7%9A%84%E6%8E%A8%E8%8D%90%E6%8A%A5%E5%91%8A_%E9%98%BF%E5%B0%94%E6%B3%95%E5%85%AC%E7%A4%BE.pdf" class="btn">下载 PDF 报告</a>
    </div>
  </div>
  <div class="footer">本报告所引用信息均来自公开披露渠道，仅供参考，不构成任何投资建议。</div>
</div>
</body>
</html>
